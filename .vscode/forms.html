<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <h1>Forms in HTML</h1>
    <p>Forms are used to collect user input. They can contain various types of input elements such as text fields, checkboxes, radio buttons, and submit buttons. Forms are essential for creating interactive web applications and allowing users to submit data to a server.</p>
    <form>       
        <label for="username">Name:</label>
        <input type="text" id="username" name = "username">
        <br><br>
        <label for="fathers_name">Father's Name:</label>
        <input type="text" id="fathers_name" name = "fathers_name">
        <br><br>
        <label for="age">Age:</label>
        <input type="number" id="age" name = "age">
        <br><br>
        <label for="password">Password:</label>
        <input type="password" id="password" name = "password">
        <br><br>
        <label for="Male">Male</label>
        <input type="radio" id="Male" name="gender" value="male">
        <label for="Female">Female</label>
        <input type="radio" id="Female" name="gender" value="female">
        <br><br>
        <label for="submit"></label>
        <input type="submit">
    </form>
    
</body>
</html>
